<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KL TOURNAMENTS - Offline</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: #000;
        color: #fff;
        font-family: 'Rajdhani', 'Segoe UI', sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        overflow: hidden;
        position: relative;
        background-image: radial-gradient(ellipse at center, #1a0a00 0%, #000 70%);
      }

      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(255,140,0,0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,140,0,0.04) 1px, transparent 1px);
        background-size: 50px 50px;
        pointer-events: none;
      }

      .container {
        position: relative;
        z-index: 1;
        text-align: center;
        max-width: 420px;
        width: 100%;
      }

      .logo-wrap {
        width: 110px;
        height: 110px;
        margin: 0 auto 24px;
        border-radius: 22px;
        overflow: hidden;
        border: 2px solid rgba(255,140,0,0.5);
        box-shadow: 0 0 30px rgba(255,140,0,0.3);
        animation: glow-pulse 2s ease-in-out infinite;
      }

      .logo-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      @keyframes glow-pulse {
        0%, 100% { box-shadow: 0 0 20px rgba(255,140,0,0.3); }
        50% { box-shadow: 0 0 40px rgba(255,140,0,0.6); }
      }

      h2 {
        font-family: 'Orbitron', monospace;
        font-size: 11px;
        letter-spacing: 5px;
        color: #FF8C00;
        text-shadow: 0 0 10px rgba(255,140,0,0.6);
        margin-bottom: 8px;
        text-transform: uppercase;
      }

      h1 {
        font-family: 'Orbitron', monospace;
        font-size: clamp(24px, 6vw, 36px);
        font-weight: 900;
        color: #fff;
        margin-bottom: 12px;
      }

      h1 span { color: #FF8C00; text-shadow: 0 0 15px rgba(255,140,0,0.7); }

      .subtitle {
        font-size: 15px;
        color: #888;
        line-height: 1.6;
        margin-bottom: 28px;
      }

      .subtitle strong { color: #ccc; }

      .features {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 28px;
      }

      .feat {
        background: rgba(255,140,0,0.06);
        border: 1px solid rgba(255,140,0,0.15);
        border-radius: 10px;
        padding: 12px;
        text-align: left;
      }

      .feat-icon { font-size: 18px; margin-bottom: 4px; }
      .feat-title { font-size: 11px; font-weight: 700; color: #FF8C00; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
      .feat-desc { font-size: 11px; color: #666; line-height: 1.4; }

      .retry-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: linear-gradient(135deg, #FF8C00, #FF4444);
        color: #fff;
        font-family: 'Orbitron', monospace;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        padding: 13px 32px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        box-shadow: 0 0 20px rgba(255,140,0,0.4);
        margin-bottom: 14px;
        transition: all 0.2s;
      }

      .retry-btn:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(255,140,0,0.6); }

      .status {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-size: 12px;
        color: #555;
      }

      .dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: #FF4444;
        box-shadow: 0 0 6px #FF4444;
        animation: blink 1.5s ease-in-out infinite;
      }

      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div class="container">
      <div class="logo-wrap">
        <img src="/assets/generated/kl-icon-192.dim_192x192.png" alt="KL TOURNAMENTS" />
      </div>

      <h2>KL TOURNAMENTS</h2>
      <h1>You're <span>Offline</span></h1>

      <p class="subtitle">
        No internet connection detected.<br />
        <strong>Some features are still available!</strong>
      </p>

      <div class="features">
        <div class="feat">
          <div class="feat-icon">📋</div>
          <div class="feat-title">Matches</div>
          <div class="feat-desc">View cached tournament history</div>
        </div>
        <div class="feat">
          <div class="feat-icon">👤</div>
          <div class="feat-title">Profile</div>
          <div class="feat-desc">Access your cached profile</div>
        </div>
        <div class="feat">
          <div class="feat-icon">📖</div>
          <div class="feat-title">Rules</div>
          <div class="feat-desc">Read tournament rules</div>
        </div>
        <div class="feat">
          <div class="feat-icon">🏆</div>
          <div class="feat-title">Leaderboard</div>
          <div class="feat-desc">Last synced rankings</div>
        </div>
      </div>

      <button class="retry-btn" onclick="retryConnection()">🔄 Retry Connection</button>

      <div class="status">
        <span class="dot"></span>
        <span>Waiting for network...</span>
      </div>
    </div>

    <script>
      function retryConnection() {
        if (navigator.onLine) {
          window.location.href = '/';
        } else {
          const btn = document.querySelector('.retry-btn');
          btn.textContent = '❌ Still Offline...';
          setTimeout(() => { btn.textContent = '🔄 Retry Connection'; }, 2000);
        }
      }
      window.addEventListener('online', () => window.location.reload());
    </script>
  </body>
</html>
